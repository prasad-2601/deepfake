<!DOCTYPE html>
<html>
<head>
    <title>Deepfake Detection</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #111;
            color: white;
        }
        h1 {
            margin-top: 50px;
        }
        form {
            margin-top: 30px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 24px;
            color: yellow;
        }
    </style>
</head>
<body>

<h1>Deepfake Detection System</h1>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <br>
    <button type="submit">Upload & Detect</button>
</form>

{% if result %}
<div class="result">
    Result: {{ result }}
</div>
{% endif %}

</body>
</html>
